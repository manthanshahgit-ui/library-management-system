<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="studententer.css">
</head>
<body>
    <!-- <div>     -->
    <form method="POST" action="/register">

    <label>Student Registration</label>

    <input type="text" id="fname" name="fname" placeholder="enter the student firstname" required>

    <input type="text" id="Mname" name="Mname" placeholder="enter the student middlename" required>

    <input type="text" id="Lname" name="Lname" placeholder="enter the student lastname" required>

    <input type="email" id="Smail" name="Smail" placeholder="student email" required>

    <input type="date" id="DOB" name="DOB" required>

    <input type="tel" id="Snumber" name="Snumber" placeholder="student number" required>

    <input type="tel" id="Pnumber" name="Pnumber" placeholder="parent number" required>

    <input type="text" id="Saddress" name="Saddress" placeholder="address of student" required>

    <input type="date" id="DOR" name="DOR" required>

    <button type="submit">Submit</button>

</form>
    <!-- </div> -->
</body>
<script src="studententer.js"></script>
</html>
